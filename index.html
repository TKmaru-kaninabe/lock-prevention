<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>lock prevention</title>

<style>
:root {
  --bg-color: #ffffff;
  --button-bg: #e0e0e0;
  --button-text: #000;
}

/* ダークテーマ */
body.dark {
  --bg-color: #0e1a2b;
  --button-bg: #1e2d45;
  --button-text: #ffffff;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: var(--bg-color);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background 0.8s ease;
}

/* ===== ローディング丸 ===== */
#loader {
  display: flex;
  gap: 16px;
}

.dot {
  width: 15px;
  height: 15px;
  background: #999; /* ← 絶対変更しない */
  border-radius: 50%;
  transform: scale(1);
  transition: transform 0.3s ease;
}

/* ===== テーマボタン ===== */
.theme-btn {
  position: fixed;
  right: 12px;
  bottom: 12px;
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  background: var(--button-bg);
  color: var(--button-text);
  font-size: 14px;
  cursor: pointer;
  opacity: 0.7;
}

.theme-btn:hover {
  opacity: 1;
}
</style>
</head>

<body>

<!-- ローディング -->
<div id="loader">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<!-- テーマ切り替えボタン（1個） -->
<button id="themeBtn" class="theme-btn">Dark</button>

<script>
/* ===== 丸アニメーション ===== */
const dots = document.querySelectorAll('.dot');
let current = 0;

setInterval(() => {
  dots.forEach((dot, i) => {
    dot.style.transform = (i === current) ? 'scale(1.7)' : 'scale(1)';
  });
  current = (current + 1) % dots.length;
}, 500);

/* ===== テーマ切り替え（トグル） ===== */
const themeBtn = document.getElementById('themeBtn');

themeBtn.onclick = () => {
  document.body.classList.toggle('dark');
  themeBtn.textContent =
    document.body.classList.contains('dark') ? 'White' : 'Dark';
};

/* ===== 画面スリープ防止 ===== */
let wakeLock = null;

async function enableWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) {}
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wakeLock) {
    enableWakeLock();
  }
});

enableWakeLock();
</script>

</body>
</html>
